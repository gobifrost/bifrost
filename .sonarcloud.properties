# SonarQube Cloud automatic analysis ignores sonar-project.properties.
# This test owns CLI endpoint URL fixtures; local/dev URLs may be http://
# without representing production-facing transport.
sonar.test.exclusions=api/tests/unit/cli/test_cli_version_check.py
# Local debug compose wires S3-compatible credentials through environment
# variable names that intentionally contain SECRET; values are supplied by .env.
sonar.exclusions=docker-compose.debug.yml
