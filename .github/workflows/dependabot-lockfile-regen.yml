# Validate requirements.lock on Dependabot PRs.
#
# Why: PR #112 pinned every pip dep by sha256 in `requirements.lock`, installed
# with `pip install --require-hashes`. Dependabot only edits `pyproject.toml`
# — it does not regenerate the lock — so every Dependabot Python bump leaves
# the lock stale and CI fails until a maintainer regenerates it by hand.
#
# This workflow detects Dependabot PRs that touch `pyproject.toml` and verifies
# that `requirements.lock` is already in sync with the same
# `pip-compile --generate-hashes` command documented at the top of the lock
# file. It does not commit back to the PR branch; lockfile updates must arrive
# as reviewable Dependabot or maintainer commits.
#
# Trigger: `pull_request` (not `pull_request_target`) — validation only needs
# read access and must not push commits back to the PR branch.

name: Validate requirements.lock for Dependabot

on:
  pull_request:
    paths:
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  validate:
    # Same gating pattern as dependabot-auto-merge.yml — only run for PRs
    # opened by the Dependabot bot account.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Check out the PR's head ref so validation runs against the proposed
          # dependency metadata without granting this workflow write authority.
          ref: ${{ github.head_ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Validate requirements.lock
        # Use the same Python minor as api/Dockerfile's FROM line (3.14-slim).
        # Hash sets are tied to the Python version that resolved them, so
        # regenerating with a different minor would produce a lock the
        # production build can't install with --require-hashes.
        #
        # pip-tools itself is bootstrapped from `requirements-piptools.lock`
        # (a tiny hash-pinned lock that only contains pip-tools + transitive
        # deps) so the install satisfies Scorecard's Pinned-Dependencies
        # check. Regenerate that lock with the same `pip-compile` command
        # documented at the top of the file.
        run: |
          docker run --rm -v "$PWD":/repo -w /repo python:3.14-slim sh -c "
            pip install --quiet --require-hashes -r requirements-piptools.lock
            pip-compile --generate-hashes --output-file=requirements.lock pyproject.toml
          "
          if [[ -n "$(git status --porcelain requirements.lock)" ]]; then
            git diff -- requirements.lock
            echo "::error::requirements.lock is stale. Regenerate it in a trusted maintainer environment and commit the lockfile update."
            exit 1
          fi
