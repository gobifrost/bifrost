# Lightweight visibility for documentation-only PRs.
#
# This workflow intentionally does not reuse CI's required check names.
# Branch protection must be satisfied by the real jobs in ci.yml.

name: Docs-only CI Notice

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.txt"
      - "**/*.png"
      - "**/*.jpg"
      - "**/*.jpeg"
      - "**/*.gif"
      - "**/*.svg"
      - "**/*.webp"
      - "**/*.ico"
      - ".claude/**"
      - ".claude-plugin/**"
      - "docs/**"
      - "LICENSE"
      - ".github/CODEOWNERS"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/dependabot.yml"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"
      - ".prettierrc*"
      - ".prettierignore"
      - ".vscode/**"
      - ".idea/**"

permissions:
  contents: read

jobs:
  docs-only-notice:
    runs-on: ubuntu-latest
    name: Docs-only CI notice
    steps:
      - run: echo "Real required checks run from ci.yml on every pull request."
